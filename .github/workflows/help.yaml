name: automatizando terraform

on:
  push:
    branches: ["main"]

jobs:
  teste:
    runs-on: ubuntu-latest

    steps:
      - name: baixa codigo
        uses: actions/checkout@v4 # Copia seus arquivos .tf para a VM

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3 # Instala o executável na VM
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform # Entra na pasta certa
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-2" # Ajuda o Terraform a achar o S3